<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>美股回檔追蹤器</title>
<style>
  :root {
    --bg: #f2ede1; --card: #ffffff; --text: #3d3426; --muted: #94886f;
    --border: #e4dac2; --head: #f0e8d4; --accent: #a1741f;
    --ok: #a89c84; --mild: #b97d0e; --deep: #c03a2b; --severe: #7c1f14;
    --gain: #4e8a54; --loss: #c03a2b;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #211b11; --card: #2b2416; --text: #ece2cd; --muted: #a5977c;
      --border: #463b26; --head: #352c1a; --accent: #d3a04e;
      --ok: #8d8168; --mild: #e0a33a; --deep: #e57363; --severe: #ef4444;
      --gain: #7cc283; --loss: #e57363;
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; padding: 62px 16px 16px; background: var(--bg); color: var(--text);
         font: 15px/1.5 "Segoe UI", "Microsoft JhengHei", system-ui, sans-serif; }
  .wrap { max-width: 1080px; margin: 0 auto; }
  #ixicbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap;
    padding: 10px 18px; background: var(--card);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 1px 6px rgba(0,0,0,.08);
    font-variant-numeric: tabular-nums;
  }
  #ixicbar .idxname { font-weight: 700; font-size: 14px; }
  #ixicbar .idxprice { font-size: 17px; font-weight: 700; }
  #ixicbar .idxchg { font-size: 15px; font-weight: 700; }
  #ixicbar .idxdate { font-size: 12px; color: var(--muted); }
  h1 { font-size: 24px; margin: 10px 0 0; letter-spacing: 5px;
       font-family: "Noto Serif TC", Georgia, "Microsoft JhengHei", serif; }
  .subtitle { color: var(--muted); font-size: 11.5px; letter-spacing: 5px;
              margin: 2px 0 10px; font-family: Georgia, serif; }
  .meta { color: var(--muted); font-size: 13px; margin-bottom: 14px;
          padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .toolbar button {
    padding: 6px 14px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--card); color: var(--text); cursor: pointer; font-size: 14px;
  }
  .toolbar button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px;
          margin-bottom: 16px; overflow: hidden;
          box-shadow: 0 1px 4px rgba(90, 70, 30, .06); }
  .card h2 { font-size: 16px; margin: 0; padding: 10px 14px; background: var(--head);
             border-bottom: 1px solid var(--border); }
  .tblwrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
  th, td { padding: 7px 12px; text-align: right; white-space: nowrap;
           border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 600; font-size: 12.5px; }
  th:first-child, td:first-child { text-align: left; }
  tr:last-child td { border-bottom: none; }
  tr.subhead td { text-align: left; font-size: 12.5px; font-weight: 700;
                  color: var(--accent); background: color-mix(in srgb, var(--accent) 6%, var(--card));
                  padding: 5px 12px; }
  td.sym a { color: var(--text); font-weight: 700; text-decoration: none; }
  td.sym a:hover { color: var(--accent); text-decoration: underline; }
  .star { cursor: pointer; margin-right: 7px; color: var(--border); font-size: 15px;
          user-select: none; transition: color .15s; }
  .star:hover { color: var(--accent); }
  .star.on { color: var(--accent); }
  .watchhint { padding: 14px; color: var(--muted); font-size: 13.5px; }
  td .sub { display: block; font-size: 11px; color: var(--muted); font-weight: 400; }
  .p0 { color: var(--ok); }
  .p1 { color: var(--mild); }
  .p2 { color: var(--deep); font-weight: 600; }
  .p3 { color: var(--severe); font-weight: 700; }
  .up { color: var(--gain); }
  .down { color: var(--loss); }
  .note { color: var(--muted); font-size: 12.5px; margin: 10px 2px 30px; }
  .failed { color: var(--deep); font-size: 13px; margin-bottom: 12px; }
</style>
</head>
<body>
<div id="ixicbar" hidden>
  <span class="idxname">那斯達克綜合指數 IXIC</span>
  <span class="idxprice" id="idxPrice"></span>
  <span class="idxchg" id="idxChg"></span>
  <span class="idxdate" id="idxDate"></span>
</div>
<div class="wrap">
  <h1><span style="color:var(--accent)">◆</span> 美股回檔追蹤器</h1>
  <div class="subtitle">US STOCK DRAWDOWN TRACKER</div>
  <div class="meta" id="meta">載入中…</div>
  <div class="failed" id="failed" hidden></div>
  <div id="watch"></div>
  <div id="content"></div>
  <div class="note">
    「最大跌幅」＝本段連續下跌中，段內高點到段內最低點（影線）的跌幅；「目前回檔」＝最新收盤價相對段內高點的跌幅。
    反彈超過（高點＋低點）÷2 即視為該段結束並重新起算。資料來源：Yahoo Finance 日線（還原股價），每個交易日盤後自動更新。
  </div>
</div>
<script>
let DB = null;

// 自選股：存在瀏覽器 localStorage
const WL = new Set(JSON.parse(localStorage.getItem('watchlist') || '[]'));

function toggleWatch(sym) {
  WL.has(sym) ? WL.delete(sym) : WL.add(sym);
  localStorage.setItem('watchlist', JSON.stringify([...WL]));
  renderWatch();
  render();
}

function renderWatch() {
  const el = document.getElementById('watch');
  let body = '';
  for (const g of DB.groups) {
    const items = [];
    for (const s of g.subs) for (const sym of s.tickers) {
      if (WL.has(sym)) items.push([sym, s.name]);
    }
    if (!items.length) continue;
    items.sort((a, b) => {
      const da = DB.data[a[0]], db_ = DB.data[b[0]];
      if (!da) return 1;
      if (!db_) return -1;
      return da.cur - db_.cur;
    });
    body += `<tr class="subhead"><td colspan="8">${g.name}</td></tr>`;
    for (const [sym, tag] of items) body += rowHtml(sym, tag);
  }
  const inner = body
    ? `<div class="tblwrap"><table>${THEAD}<tbody>${body}</tbody></table></div>`
    : `<div class="watchhint">還沒有自選股——點任一股票代號前面的 ☆ 加入，再點一次 ★ 移除。</div>`;
  el.innerHTML = `<div class="card"><h2>⭐ 自選股</h2>${inner}</div>`;
}

function pctClass(v) {
  if (v === null || v === undefined) return 'p0';
  const a = Math.abs(v);
  if (a < 15) return 'p0';
  if (a < 30) return 'p1';
  if (a < 40) return 'p2';
  return 'p3';
}
function fmtPct(v) { return (v === 0 ? '0%' : v.toFixed(2) + '%'); }
function fmtChg(v) { return (v > 0 ? '+' : '') + v.toFixed(2) + '%'; }
function chgClass(v) { return v > 0 ? 'up' : (v < 0 ? 'down' : 'p0'); }
function tvLink(sym) { return 'https://tw.tradingview.com/chart/?symbol=' + encodeURIComponent(sym); }

function rowHtml(sym, tag) {
  const d = DB.data[sym];
  const tagHtml = tag ? `<span class="sub">${tag}</span>` : '';
  const on = WL.has(sym);
  const star = `<span class="star${on ? ' on' : ''}" title="${on ? '移出自選股' : '加入自選股'}" onclick="toggleWatch('${sym}')">${on ? '★' : '☆'}</span>`;
  if (!d) return `<tr><td class="sym">${star}${sym}${tagHtml}</td><td colspan="7" style="text-align:center;color:var(--muted)">無資料</td></tr>`;
  return `<tr>
    <td class="sym">${star}<a href="${tvLink(sym)}" target="_blank" rel="noopener">${sym}</a>${tagHtml}</td>
    <td>${d.price.toFixed(2)}</td>
    <td class="${chgClass(d.chg)}">${fmtChg(d.chg)}</td>
    <td class="${pctClass(d.cur)}">${fmtPct(d.cur)}</td>
    <td>${fmtDays(d)}</td>
    <td>${d.peak.toFixed(2)}<span class="sub">${d.peak_date}</span></td>
    <td>${d.low.toFixed(2)}<span class="sub">${d.low_date}</span></td>
    <td class="${pctClass(d.maxdd)}">${fmtPct(d.maxdd)}</td>
  </tr>`;
}

function fmtDays(d) {
  // 回檔第 1 天且回檔幅度小於 10% → 視為尚未形成回檔，顯示橫線
  if (d.days === 1 && Math.abs(d.cur) < 10) return '－';
  return d.days + ' 天';
}

const THEAD = `<thead><tr>
  <th>代號</th><th>收盤價</th><th>今日漲跌</th><th>目前回檔</th><th>回檔天數</th><th>波段高點</th><th>波段低點</th><th>最大跌幅</th>
</tr></thead>`;

function sortByCur(tickers) {
  // 子分類內依「目前回檔」由深至淺排序
  return [...tickers].sort((a, b) => {
    const da = DB.data[a], db_ = DB.data[b];
    if (!da) return 1;
    if (!db_) return -1;
    return da.cur - db_.cur;
  });
}

function render() {
  let html = '';
  for (const g of DB.groups) {
    let body = '';
    for (const s of g.subs) {
      body += `<tr class="subhead"><td colspan="8">${s.name}</td></tr>`;
      for (const sym of sortByCur(s.tickers)) body += rowHtml(sym);
    }
    html += `<div class="card"><h2>${g.name}</h2><div class="tblwrap"><table>${THEAD}<tbody>${body}</tbody></table></div></div>`;
  }
  document.getElementById('content').innerHTML = html;
}

function renderIndex() {
  const ix = DB.index;
  if (!ix) return;
  const bar = document.getElementById('ixicbar');
  bar.hidden = false;
  document.getElementById('idxPrice').textContent = ix.price.toLocaleString('en-US');
  const chgEl = document.getElementById('idxChg');
  chgEl.textContent = `${ix.chg_pts > 0 ? '+' : ''}${ix.chg_pts.toLocaleString('en-US')} (${ix.chg > 0 ? '+' : ''}${ix.chg.toFixed(2)}%)`;
  chgEl.className = 'idxchg ' + (ix.chg_pts > 0 ? 'up' : (ix.chg_pts < 0 ? 'down' : 'p0'));
  document.getElementById('idxDate').textContent = ix.date;
}

fetch('data.json?t=' + Date.now())
  .then(r => r.json())
  .then(db => {
    DB = db;
    const dt = new Date(db.updated);
    const taipei = dt.toLocaleString('zh-TW', { timeZone: 'Asia/Taipei', hour12: false });
    const n = Object.keys(db.data).length;
    document.getElementById('meta').textContent =
      `資料更新時間：${taipei}（台北）｜追蹤 ${n} 檔｜資料日期：${db.data[Object.keys(db.data)[0]]?.date || '-'}`;
    if (db.failed && db.failed.length) {
      const f = document.getElementById('failed');
      f.hidden = false;
      f.textContent = '⚠ 以下標的本次抓取失敗：' + db.failed.join(', ');
    }
    renderIndex();
    renderWatch();
    render();
  })
  .catch(e => { document.getElementById('meta').textContent = '載入 data.json 失敗：' + e; });
</script>
</body>
</html>
