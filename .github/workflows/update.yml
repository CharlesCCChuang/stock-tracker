name: Update stock data

on:
  schedule:
    # 台北時間週二~週六 05:47（UTC 21:47，涵蓋美股週一~週五收盤後）
    # 刻意避開整點/半點：GitHub 在尖峰時段可能延遲或跳過排程
    - cron: "47 21 * * 1-5"
    # 備援：台北 07:23 再跑一次，第一次被跳過時補上（資料相同時不會重複 commit）
    - cron: "23 23 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch prices and compute drawdowns
        run: python tracker.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "Update data $(date -u +%Y-%m-%d)"
            git push
          fi
